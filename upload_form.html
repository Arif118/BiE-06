<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Photo | BiE-06</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#070b14;
    color:white;
    min-height:100vh;
    overflow-x:hidden;
}

body::before{
    content:'';
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at 20% 20%, rgba(0,229,255,.15), transparent 30%),
    radial-gradient(circle at 80% 20%, rgba(138,92,255,.15), transparent 30%),
    radial-gradient(circle at 50% 90%, rgba(0,255,170,.10), transparent 30%);
    z-index:-2;
}

.container{
    width:min(700px,92%);
    margin:auto;
    padding:40px 0;
}

.card{
    background:rgba(255,255,255,.05);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,.08);
    border-radius:28px;
    padding:30px;
}

h1{
    text-align:center;
    font-size:2.2rem;
    margin-bottom:10px;
    background:linear-gradient(
        90deg,
        #00e5ff,
        #8a5cff,
        #00ffb3
    );
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.subtitle{
    text-align:center;
    color:#9ca7c7;
    margin-bottom:30px;
}

.form-group{
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
}

input,
select{
    width:100%;
    padding:14px;
    border:none;
    outline:none;
    border-radius:14px;
    background:rgba(255,255,255,.06);
    color:white;
    border:1px solid rgba(255,255,255,.08);
}

option{
    background:#111827;
}

.preview{
    margin-top:15px;
    text-align:center;
}

.preview img{
    max-width:100%;
    max-height:300px;
    border-radius:18px;
    display:none;
}

.upload-btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:16px;
    cursor:pointer;
    color:white;
    font-size:1rem;
    font-weight:700;
    background:linear-gradient(
        135deg,
        #00e5ff,
        #8a5cff
    );
    transition:.3s;
}

.upload-btn:hover{
    transform:translateY(-3px);
}

.status{
    text-align:center;
    margin-top:20px;
    color:#9ca7c7;
}

.success-box{
    display:none;
    text-align:center;
    margin-top:25px;
}

.success-box h2{
    color:#00ffb3;
    margin-bottom:20px;
}

.action-buttons{
    display:flex;
    gap:15px;
    justify-content:center;
    flex-wrap:wrap;
}

.action-buttons a,
.action-buttons button{
    text-decoration:none;
    border:none;
    cursor:pointer;
    color:white;
    padding:12px 24px;
    border-radius:14px;
    font-weight:600;
}

.upload-again{
    background:linear-gradient(
        135deg,
        #00e5ff,
        #007bff
    );
}

.view-gallery{
    background:linear-gradient(
        135deg,
        #8a5cff,
        #00e5ff
    );
}

.back-home{
    display:inline-block;
    margin-bottom:20px;
    text-decoration:none;
    color:white;
    background:rgba(255,255,255,.08);
    padding:10px 18px;
    border-radius:12px;
}

.loader{
    display:none;
    margin-top:15px;
    text-align:center;
    color:#00e5ff;
}

@media(max-width:600px){

    .card{
        padding:20px;
    }

    h1{
        font-size:1.8rem;
    }

}
</style>
</head>

<body>

<div class="container">

<a href="index.html" class="back-home">
← Back To Home
</a>

<div class="card">

<h1>📸 Upload Photo</h1>

<p class="subtitle">
Share memorable moments with BiE-06
</p>

<form id="uploadForm">

<div class="form-group">
<label>Title</label>
<input
type="text"
id="title"
required
placeholder="Enter title">
</div>

<div class="form-group">
<label>Uploaded By</label>
<input
type="text"
id="uploadedBy"
required
placeholder="Your name">
</div>

<div class="form-group">
<label>Category</label>
<select id="category" required>
<option value="">Select Category</option>
<option>Notes</option>
<option>Campus</option>
<option>Workshop</option>
<option>Event</option>
<option>Photo</option>
</select>
</div>

<div class="form-group">
<label>Choose Photo</label>
<input
type="file"
id="imageFile"
accept="image/*"
required>
</div>

<div class="preview">
<img id="previewImage">
</div>

<button
type="submit"
class="upload-btn">
🚀 Upload Photo
</button>

</form>

<div class="loader" id="loader">
Uploading...
</div>

<div class="status" id="status"></div>

<div class="success-box" id="successBox">

<h2>✅ Upload Successful</h2>

<div class="action-buttons">

<button
class="upload-again"
onclick="location.reload()">
Upload Another
</button>

<a href="https://arif118.github.io/BiE-06/note_gallery.html"
class="view-gallery">
View Gallery
</a>

</div>
</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

/* ====================================
PASTE YOUR SUPABASE DETAILS HERE
==================================== */

const SUPABASE_URL =
"https://pxzavbpnxwgysomqunpf.supabase.co";

const SUPABASE_ANON_KEY =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB4emF2YnBueHdneXNvbXF1bnBmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MzUyMDgsImV4cCI6MjA5NzIxMTIwOH0.JPw1Hm4n9oqghLXyfTdatKXTqb8vZENp0PPYbJG4ahs";

/* ==================================== */

const { createClient } = window.supabase;

const supabaseClient=
createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
);

const imageInput =
document.getElementById("imageFile");

const previewImage =
document.getElementById("previewImage");

imageInput.addEventListener(
"change",
function(){

    const file =
    this.files[0];

    if(file){

        previewImage.src =
        URL.createObjectURL(file);

        previewImage.style.display =
        "block";

    }

}
);

document
.getElementById("uploadForm")
.addEventListener(
"submit",
async function(e){

    e.preventDefault();

    const title =
    document.getElementById("title").value;

    const uploadedBy =
    document.getElementById("uploadedBy").value;

    const category =
    document.getElementById("category").value;

    const file =
    imageInput.files[0];

    const loader =
    document.getElementById("loader");

    const status =
    document.getElementById("status");

    loader.style.display =
    "block";

    try{

        const fileName =
        Date.now() +
        "_" +
        file.name;

        const {
            error:uploadError
        } = await supabaseClient
        .storage
        .from("Notes")
        .upload(
            fileName,
            file
        );

        if(uploadError)
            throw uploadError;

        const {
            data:publicData
        } = supabaseClient
        .storage
        .from("Notes")
        .getPublicUrl(
            fileName
        );

        const imageUrl =
        publicData.publicUrl;

        const {
            error:dbError
        } = await supabaseClient
        .from("gallery_images")
        .insert([
            {
                Title:title,
                image_url:imageUrl,
                uploaded_by:uploadedBy,
                category:category,
                file_name:fileName
            }
        ]);

        if(dbError)
            throw dbError;

        loader.style.display =
        "none";

        document
        .getElementById("uploadForm")
        .style.display =
        "none";

        document
        .getElementById("successBox")
        .style.display =
        "block";

    }

    catch(err){

        console.error(err);

        loader.style.display =
        "none";

        status.innerHTML =
        "❌ Upload Failed<br><br>" +
        err.message;

    }

});

</script>

</body>
</html>
