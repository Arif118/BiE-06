<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BAUBot | BiE-06</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');

*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

:root{
--text:#f5f7ff;
--muted:#9ca7c7;
--card:rgba(255,255,255,.05);
--border:rgba(255,255,255,.08);
}

html,body{
height:100%;
}

body{
background:#070b14;
color:var(--text);
overflow:hidden;
}

body::before{
content:'';
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 20%, rgba(0,229,255,.15), transparent 30%),
radial-gradient(circle at 80% 20%, rgba(138,92,255,.15), transparent 30%),
radial-gradient(circle at 50% 80%, rgba(0,255,170,.08), transparent 30%);
z-index:-2;
}

.stars{
position:fixed;
inset:0;
background-image:radial-gradient(white 1px, transparent 1px);
background-size:40px 40px;
opacity:.05;
z-index:-1;
}

.container{
width:min(95%,700px);
margin:auto;
height:100dvh;
display:flex;
flex-direction:column;
padding:12px 0;
}

.back-btn{
position:fixed;
top:12px;
left:12px;
text-decoration:none;
color:white;
padding:10px 14px;
font-size:.9rem;
border-radius:12px;
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.08);
z-index:100;
}

.header{text-align:center;padding:18px 0;flex-shrink:0;}

.header h1{
font-size:3rem;
background:linear-gradient(90deg,#00e5ff,#8a5cff,#00ffb3);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.beta-badge{
display:inline-block;
margin-top:8px;
padding:6px 12px;
border-radius:999px;
font-size:.8rem;
color:#8ff5ff;
background:rgba(0,229,255,.12);
border:1px solid rgba(0,229,255,.2);
}

.header p{
margin-top:10px;
color:var(--muted);
font-size:.95rem;
}

.chat-container{
flex:1;
min-height:0;
display:flex;
flex-direction:column;
background:var(--card);
border:1px solid var(--border);
border-radius:24px;
backdrop-filter:blur(15px);
overflow:hidden;
}

.chat-box{
flex:1;
min-height:0;
overflow-y:auto;
padding:15px;
}

.message{
max-width:88%;
padding:14px 18px;
margin-bottom:14px;
border-radius:20px;
line-height:1.6;
}

.bot{
background:rgba(138,92,255,.15);
border:1px solid rgba(138,92,255,.25);
}

.user{
margin-left:auto;
background:rgba(0,229,255,.12);
border:1px solid rgba(0,229,255,.25);
}

.typing{
display:none;
padding:10px 15px;
color:var(--muted);
}

.input-area{
display:flex;
align-items:flex-end;
gap:10px;
padding:12px;
border-top:1px solid rgba(255,255,255,.08);
background:#0b1220;
flex-shrink:0;
}

#userInput{
flex:1;
min-height:56px;
max-height:140px;
padding:16px;
border:none;
outline:none;
resize:none;
border-radius:16px;
background:rgba(255,255,255,.06);
color:white;
font-size:16px;
overflow-y:auto;
}

.send-btn{
width:56px;
height:56px;
flex-shrink:0;
border:none;
border-radius:16px;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
font-size:1.3rem;
color:white;
background:linear-gradient(135deg,#00e5ff,#8a5cff);
}

.send-btn:active{
transform:scale(.92);
}
</style>
</head>
<body>

<div class="stars"></div>

<a href="index.html" class="back-btn">←</a>

<div class="container">

<div class="header">
<h1>BAUBot</h1>
<div class="beta-badge">🚧 Beta Version</div>
<p>Bioinformatics Engineering AI Assistant</p>
</div>

<div class="chat-container">

<div id="chatBox" class="chat-box">
<div class="message bot">
👋 Assalamu Alaikum!<br><br>
I am BAUBot.<br><br>
Currently I am in beta version.
</div>
</div>

<div id="typing" class="typing">
BAUBot is thinking...
</div>

<div class="input-area">
<textarea id="userInput" rows="1" placeholder="Ask BAUBot anything..."></textarea>
<button id="sendBtn" class="send-btn">🚀</button>
</div>

</div>
</div>

<script>
const API_KEY = "AQ.Ab8RN6KE27ImtJ29UVDkdES6wpL7mfwPuH-8U5rbu6udY1U8EA";

const chatBox =
document.getElementById("chatBox");

const userInput =
document.getElementById("userInput");

const sendBtn =
document.getElementById("sendBtn");

const typing =
document.getElementById("typing");

/* ==========================
   GEMINI API
========================== */

async function askAI(prompt){

    const response =
    await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`,
    {
        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({
            contents:[
                {
                    parts:[
                        {
                            text:prompt
                        }
                    ]
                }
            ]
        })
    });

    const data =
    await response.json();

    return data
    .candidates[0]
    .content
    .parts[0]
    .text;
}

/* ==========================
   ADD MESSAGE
========================== */

function addMessage(
text,
type
){

    const div =
    document.createElement("div");

    div.className =
    `message ${type}`;

    div.innerHTML =
    text;

    chatBox.appendChild(div);

    chatBox.scrollTop =
    chatBox.scrollHeight;
}

/* ==========================
   SEND MESSAGE
========================== */

async function sendMessage(){

    const text =
    userInput.value.trim();

    if(!text)
    return;

    addMessage(
        text,
        "user"
    );

    userInput.value = "";

    userInput.style.height =
    "56px";

    typing.style.display =
    "block";

    try{

        const reply =
        await askAI(text);

        typing.style.display =
        "none";

        addMessage(
            reply,
            "bot"
        );

    }

    catch(err){

        typing.style.display =
        "none";

        console.error(err);

        addMessage(
            "⚠️ BAUBot is currently unavailable.",
            "bot"
        );

    }

}

/* ==========================
   AUTO RESIZE TEXTAREA
========================== */

userInput.addEventListener(
"input",
()=>{

    userInput.style.height =
    "auto";

    userInput.style.height =
    userInput.scrollHeight +
    "px";

}
);

/* ==========================
   SEND BUTTON
========================== */

sendBtn.addEventListener(
"click",
sendMessage
);

/* ==========================
   ENTER / SHIFT+ENTER
========================== */

userInput.addEventListener(
"keydown",
(e)=>{

    if(
        e.key === "Enter"
        &&
        !e.shiftKey
    ){

        e.preventDefault();

        sendMessage();

    }

}
);
</script>

</body>
</html>
